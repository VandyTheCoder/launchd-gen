# GoReleaser config for launchd-gen
# Docs: https://goreleaser.com
#
# Release flow:
#   1. git tag v0.1.0
#   2. git push --tags
#   3. GitHub Actions runs `goreleaser release --clean`
#   4. Binaries are published to the GitHub Release
#   5. The Homebrew formula in VandyTheCoder/homebrew-tools is auto-updated

version: 2

project_name: launchd-gen

before:
  hooks:
    - go mod tidy

builds:
  - id: launchd-gen
    main: .
    binary: launchd-gen
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: launchd-gen
    repository:
      owner: VandyTheCoder
      name: homebrew-tools
      branch: main
    directory: Formula
    homepage: "https://github.com/VandyTheCoder/launchd-gen"
    description: "Convert cron expressions into macOS launchd plists"
    license: "MIT"
    test: |
      system "#{bin}/launchd-gen", "--help"
    install: |
      bin.install "launchd-gen"
