# GoReleaser config for launchd-gen
# Docs: https://goreleaser.com
#
# Release flow:
#   1. git tag v0.1.0
#   2. git push --tags
#   3. GitHub Actions runs `goreleaser release --clean`
#   4. Binaries are published to the GitHub Release
#   5. The Homebrew cask in VandyTheCoder/homebrew-tools is auto-updated

version: 2

project_name: launchd-gen

before:
  hooks:
    - go mod tidy

builds:
  - id: launchd-gen
    main: .
    binary: launchd-gen
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew cask (Homebrew now prefers casks for pre-built binaries over formulas).
# Users will install via:
#   brew tap VandyTheCoder/tools
#   brew install --cask launchd-gen
homebrew_casks:
  - name: launchd-gen
    repository:
      owner: VandyTheCoder
      name: homebrew-tools
      branch: main
      # Use the dedicated tap PAT, not the workflow's GITHUB_TOKEN (which only
      # has access to this repo, not to homebrew-tools). Without this override
      # GoReleaser defaults to GITHUB_TOKEN and the cross-repo push 403s with
      # "Resource not accessible by integration".
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/VandyTheCoder/launchd-gen"
    description: "Convert cron expressions into macOS launchd plists"
    binaries:
      - launchd-gen
    url:
      verified: "github.com/VandyTheCoder/launchd-gen"
    # The binary is unsigned. Remove the macOS quarantine xattr after install
    # so Gatekeeper doesn't block first-run. Replace with code signing later.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/launchd-gen"]
          end
